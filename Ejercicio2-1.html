<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREAR UN CUADRADO Y UN TRIÁNGULO</title>
</head>
<body>

<H2>CREAR UN CUADRADO Y UN TRIÁNGULO</H2>
<h2>REALIZADO POR: RENZO EDUARDO POLO TACURI</h2>

<canvas id="myCanvas" width="500" height="500" style="border:4px solid Black;"></canvas>

<script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");

    ctx.beginPath();
    ctx.moveTo(0, 250);
    ctx.lineTo(500, 250);
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.beginPath();
    ctx.rect(190, 60, 120, 120);
    ctx.fillStyle = "green";
    ctx.fill();
    ctx.strokeStyle = "black";
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(250, 300);  // vértice superior
    ctx.lineTo(320, 420);  // derecha
    ctx.lineTo(180, 420);  // izquierda
    ctx.closePath();
    ctx.fillStyle = "orange";
    ctx.fill();
    ctx.stroke();

</script>

</body>
</html>
