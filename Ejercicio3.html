<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREAR UN GRÁFICO DE BARRAS</title>
</head>
<body>

    <H2>GRÁFICO DE BARRAS</H2>
    <H2>REALIZADO POR: RENZO EDUARDO POLO TACURI</H2>
    <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>
    
    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");
    
        // datos de barras
        var datos = [100, 200, 300, 400, 500];
        var colores = ["red", "blue", "green", "orange", "purple"];
    
        // Dibujar barras
        var x = 50; // posición inicial en x
        var width = 50; // ancho de cada barra
        for (var i = 0; i < datos.length; i++) {
            ctx.beginPath();
            ctx.rect(x, 500 - datos[i], width, datos[i]); // x, y, ancho, alto
            ctx.fillStyle = colores[i];
            ctx.fill();
            ctx.stroke();
            x += width + 20;
    
        }
    </script>

</body>
</html>
