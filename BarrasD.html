<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Gráfico de Barras Dinámico</title>
   
   <style>
       body{
           text-align:center;
           font-family:Arial, sans-serif;
           background:#e99999;
       }
   
       h2{
           color:#333;
       }
   
       #grafico{
           width:600px;
           height:350px;
           margin:auto;
           border:4px solid black;
           background:white;
           display:flex;
           align-items:flex-end;
           justify-content:space-around;
           padding:20px;
       }

       /* contenedor eje */
       #contenedorEje{
           display:flex;
           align-items:flex-end;
           height:300px;
           margin-right:25px;
       }
       
       /* números */
       #numeros{
           display:flex;
           flex-direction:column-reverse;
           justify-content:space-between;
           height:300px;
           margin-right:8px;
           font-size:12px;
           font-weight:bold;
       }
       
       /* barra eje Y */
       #ejeY{
           width:6px;
           height:300px;
           background:black;
       }
   
       .barra{
           width:70px;
           background:steelblue;
           color:white;
           font-weight:bold;
           text-align:center;
           transition:height 0.8s;
       }
   </style>
</head>

<body>

    <h2>GRÁFICO DE BARRAS DINÁMICO</h2>
    <h3>REALIZADO POR: RENZO EDUARDO POLO TACURI</h3>
    
    
    <div id="grafico">

        <div id="contenedorEje">

            <div id="numeros">
                <div>0</div>
                <div>10</div>
                <div>20</div>
                <div>30</div>
                <div>40</div>
                <div>50</div>
                <div>60</div>
                <div>70</div>
                <div>80</div>
                <div>90</div>
                <div>100</div>
            </div>
    
            <div id="ejeY"></div>

        </div>

        <div class="barra"></div>
        <div class="barra"></div>
        <div class="barra"></div>
        <div class="barra"></div>
        <div class="barra"></div>
    </div>
    
    <script>
    
        var barras = document.getElementsByClassName("barra");
        var colores = ["red", "blue", "green", "orange", "purple"];
    
        
        // función para generar valores aleatorios y actualizar barras
        function actualizarGrafico(){
        
            for(var i = 0; i < barras.length; i++){
        
                var valor = Math.floor(Math.random() * 91) + 10; // entre 10 y 100
        
                barras[i].style.height = valor * 3 + "px"; // escala visual
                barras[i].innerHTML = valor; // mostrar número
                barras[i].style.backgroundColor = colores[i];
            }
        }
        
        // ejecutar al cargar
        actualizarGrafico();
        
        // actualizar cada segundo
        setInterval(actualizarGrafico, 1000);
    
    </script>
    
</body>
</html>
