<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAFICAR LA FUNCIÓN</title>
</head>
<body>

    <H2>GRAFICANDO LA FUNCIÓN: y = x2y = X^2Y = X2</H2>
    <H2>REALIZADO POR: RENZO EDUARDO POLO TACURI</H2>
    <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>
    
    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");
    
        // Dibujar ejes
        ctx.beginPath();
        ctx.moveTo(0, 250);   // eje X
        ctx.lineTo(500, 250);
        ctx.moveTo(250, 0);   // eje Y
        ctx.lineTo(250, 500);
        ctx.strokeStyle = "black";
        ctx.stroke();
    
        // Dibujar función y = x^2
        ctx.beginPath();
        ctx.strokeStyle = "red";
    
        for (var x = -10; x <= 10; x += 0.1) {
            var y = x * x;
    
            // Escala para que se vea bien en el canvas
            var canvasX = 250 + x * 20;
            var canvasY = 250 - y * 2;
    
            if (x === -10) {
                ctx.moveTo(canvasX, canvasY);
            } else {
                ctx.lineTo(canvasX, canvasY);
            }
        }
    
        ctx.stroke();
    </script>

</body>
</html>
